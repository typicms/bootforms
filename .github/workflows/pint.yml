name: Pint

on: [ push, pull_request ]

jobs:
    pint:
        runs-on: ubuntu-latest
        name: Pint

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.5

            - name: Install dependencies
              run: composer install --no-interaction --no-progress

            - name: Run Pint
              run: vendor/bin/pint --test
