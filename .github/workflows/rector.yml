name: Rector

on: [ push, pull_request ]

jobs:
    rector:
        runs-on: ubuntu-latest
        name: Rector

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.5

            - name: Install dependencies
              run: composer install --no-interaction --no-progress

            - name: Run Rector
              run: vendor/bin/rector --dry-run
